<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridNodes // Küresel Dağıtık Veri Ağı</title>
    <style>
        body { background: #070708; color: #00ff66; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; user-select: none; }
        .container { border: 1px solid #1a3a2a; padding: 40px; border-radius: 8px; display: inline-block; background: #0d0d11; box-shadow: 0 0 30px rgba(0, 255, 102, 0.05); }
        h1 { font-size: 24px; letter-spacing: 2px; margin-bottom: 5px; color: #ffffff; }
        .subtitle { color: #888; font-size: 12px; margin-bottom: 30px; text-transform: uppercase; }
        #balance-display { font-size: 54px; font-weight: bold; margin: 20px 0; text-shadow: 0 0 15px rgba(0, 255, 102, 0.5); }
        button { background: #00ff66; color: #000; border: none; padding: 15px 40px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; transition: all 0.3s ease; box-shadow: 0 0 15px rgba(0, 255, 102, 0.3); }
        button:hover { background: #00cc55; box-shadow: 0 0 25px rgba(0, 255, 102, 0.5); }
        button:disabled { background: #222; color: #555; box-shadow: none; cursor: not-allowed; border: 1px solid #333; }
        .status-text { margin-top: 20px; font-size: 11px; color: #00ff66; opacity: 0.7; min-height: 15px; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="container">
        <h1>GRIDNODES</h1>
        <div class="subtitle">Dağıtık Bant Genişliği ve Doğrulama Portalı</div>
        <div id="balance-display">$0.0000</div>
        <button id="start-btn">DÜĞÜMÜ BAŞLAT (KAZAN)</button>
        <div id="status" class="status-text">Sistem hazır. Bağlantı bekleniyor...</div>
    </div>

    <!-- Güvenlik Filtreleri -->
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        }
    </script>
    
    <!-- Resmi Supabase CDN Bağlantısı -->
    <script src="https://jsdelivr.net"></script>

    <!-- Otonom Motor (Tüm Sistem Tek Gövdede) -->
    <script>
        // KENDİ BİLGİLERİNİZİ BU İKİ SATIRA YAPIŞTIRIN
        const SUPABASE_URL = "https://ebuecwycqbwcnvhonlly.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVidWVjd3ljcWJ3Y252aG9ubGx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjEyODMsImV4cCI6MjA5NDQzNzI4M30.evPYCJlsWUGK7Z56kU-hogcbHZGzZ_T3T5bxv6rrWXg";

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentBalance = 0.0000;

        const startButton = document.getElementById('start-btn');
        const balanceDisplay = document.getElementById('balance-display');
        const statusDisplay = document.getElementById('status');

        startButton.addEventListener('click', async () => {
            // Butona basıldığı an yazıyı zorla değiştir
            startButton.disabled = true;
            startButton.innerText = "DÜĞÜM AKTİF";
            statusDisplay.innerText = "Ağa bağlanılıyor... İlk veri döngüsü tetiklendi.";

            // 1. ADIM: Veritabanı Okuma Doğrulaması
            try {
                const { data, error } = await supabase.from('data_tasks').select('*').limit(1);
                if (error) {
                    statusDisplay.innerText = "Supabase Hatası: " + error.message;
                    return;
                }
                if (!data || data.length === 0) {
                    statusDisplay.innerText = "Bağlantı Başarılı Ama data_tasks Tablosu Boş!";
                    return;
                }
            } catch (err) {
                statusDisplay.innerText = "Bağlantı Hatası: " + err.message;
                return;
            }

            // 2. ADIM: Otonom Sayaç Döngüsü (Her 4 saniyede bir)
            setInterval(async () => {
                try {
                    const { data: tasks } = await supabase.from('data_tasks').select('*').eq('is_active', true).limit(1);

                    if (tasks && tasks.length > 0) {
                        const task = tasks[0];
                        
                        const { error: insertError } = await supabase
                            .from('scraped_data')
                            .insert([{ task_id: task.task_id, collected_value: "NODE_VERIFIED" }]);

                        if (!insertError) {
                            currentBalance += parseFloat(task.reward_per_click);
                            balanceDisplay.innerText = `$${currentBalance.toFixed(4)}`;
                            statusDisplay.innerText = `Kusursuz Veri Doğrulaması Başarılı! (+ $${task.reward_per_click})`;
                        } else {
                            statusDisplay.innerText = "Yazma Hatası: " + insertError.message;
                        }
                    }
                } catch (error) {
                    statusDisplay.innerText = "Sistem tetikte, döngü yenileniyor...";
                }
            }, 4000);
        });
    </script>
</body>
</html>
