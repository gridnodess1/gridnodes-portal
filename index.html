<!DOCTYPE html>
<html lang="en">

    <style>
        /* Tamamen siyah, boş ve masum bir sayfa. */
        body { background: #000000; color: #111111; font-family: monospace; padding: 20px; font-size: 10px; margin: 0; overflow: hidden; user-select: none; }
        
        /* GHOST KALKANI: AADS'den gelen 120x60'lık reklam kutusunu ekrandan tamamen gizleyen görünmezlik odası */
        .phantom-container {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <!-- Görünmezlik Odası: Tarayıcı bu iframe'i arka planda yükleyip bizim için para basar ama giren kişi asla göremez -->

        <!-- BEGIN AADS AD UNIT 2437786 -->
        <div id="frame" style="width: 120px;margin: auto;z-index: 99998;height: auto">
            <iframe data-aa='2437786' src='https://a-ads.com' style='border:0; padding:0; width:120px; height:60px; overflow:hidden;display: block;margin: auto'></iframe>
        </div>
        <!-- END AADS AD UNIT 2437786 -->
    </div>

    <script>
        // SİBER GÜVENLİK: Sayfaya giren kişinin sağ tıklamasını veya incelemesini engelle
